name: Rebuild vocabulary site

on:
  push:
    paths:
      - "Key_Expressions.xlsx"
      - "template.html"
      - "build.py"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab too

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas openpyxl

      - name: Build index.html
        run: python build.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Auto-rebuild index.html from updated Excel data"
          git push
