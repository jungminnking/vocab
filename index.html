<header>

t": "Implicit", "important": "Important", "impose": "Impose", "improve": "Improve", "inadequate": "Inadequate", "include": "Include", "increase": "Increase", "indulgence": "Indulgence", "influence": "Influence", "interval": "Interval", "intimidate": "Intimidate", "invalidate": "Invalidate", "irrelvant": "Irrelvant", "isolated": "Isolated", "lack": "Lack", "lagging": "Lagging", "long-term": "Long-term", "lost": "Lost", "lucrative": "Lucrative", "many": "Many", "messy": "Messy", "mislead": "Mislead", "mix-up": "Mix up", "modest": "Modest", "monotone": "Monotone", "myopic": "Myopic", "narrative": "Narrative", "nascent": "Nascent", "nature": "Nature", "need": "Need", "neglect": "Neglect", "new": "New", "notion": "Notion", "old": "Old", "ordinary": "Ordinary", "outstanding": "Outstanding", "outstrip": "Outstrip", "overcome": "Overcome", "overwhelmed": "Overwhelmed", "pay-off": "Pay Off", "peace": "Peace", "peak": "Peak", "pioneering": "Pioneering", "pointless": "Pointless", "predict": "Predict", "premature": "Premature", "presence": "Presence", "prevent": "Prevent", "principle": "Principle", "prior-to": "Prior To", "realistic-cynical": "Realistic, Cynical", "reciprocal": "Reciprocal", "recognize": "Recognize", "reconcile": "Reconcile", "regarding": "Regarding", "replace": "Replace", "resist": "Resist", "revitalize": "Revitalize", "right": "Right", "rollover": "Rollover", "room": "Room", "search": "Search", "sharp": "Sharp", "shift": "Shift", "short-term": "Short-term", "show": "Show", "small": "Small", "solution": "Solution", "sophisticated": "Sophisticated", "spread": "Spread", "steady": "Steady", "stumble": "Stumble", "successful": "Successful", "suggest": "Suggest", "supplement": "Supplement", "support": "Support", "suspicious": "Suspicious", "symbol": "Symbol", "tipping-point": "Tipping Point", "track": "Track", "try": "Try", "two-way": "Two-way", "uncritical": "Uncritical", "understand": "Understand", "undo": "Undo", "unfold": "Unfold", "unite": "Unite", "unpleasant": "Unpleasant", "unusual": "Unusual", "urgent": "Urgent", "use": "Use", "validate": "Validate", "violate": "Violate", "vulnerable": "Vulnerable", "warning": "Warning", "weaken": "Weaken", "wealth": "Wealth", "wet": "Wet", "wish": "Wish", "worry": "Worry", "yield": "Yield", "additional-vocabulary": "Additional Vocabulary"};
const verbs = [{"verb": "caliber", "cat": "ability", "meaning": "The quality of someone's character or the level of their ability; the diameter of a gun barrel.", "ex": "The company is looking for candidates of the highest caliber to lead the new research team.", "qs": "The company is looking for candidates of the highest <span class='blank'>___________</span> to lead the new research team."}, {"verb": "advent", "cat": "abrupt", "meaning": "The arrival of a notable person, thing, or event that changes how things are done.", "ex": "The advent of the internet fundamentally changed how humans communicate and access information.", "qs": "The <span class='blank'>___________</span> of the internet fundamentally changed how humans communicate and access information."}, {"verb": "blast", "cat": "abrupt", "meaning": "A destructive wave of compressed air, or a severe reprimand; suggests a powerful, concussive impact that shatters elements.", "ex": "The ombudsman's independent report was a direct blast against the agency's total failure to enforce baseline safety codes.", "qs": "The ombudsman's independent report was a direct <span class='blank'>___________</span> against the agency's total failure to enforce baseline safety codes."}, {"verb": "bubble up", "cat": "abrupt", "meaning": "To rise to the surface; suggests localized grievances or data anomalies gradually escalating to become a primary institutional focus.", "ex": "Concerns about the bank's liquidity had been bubbling up for months before they finally erupted into a full crisis.", "qs": "Concerns about the bank's liquidity had been <span class='blank'>___________</span> for months before they finally erupted into a full crisis."}, {"verb": "burst", "cat": "abrupt", "meaning": "An instance of breaking open suddenly, or a short period of intense activity; suggests an explosive release of accumulated pressure.", "ex": "A sudden burst of capital investment transformed the quiet railway junction into a primary regional logistics hub inside two years.", "qs": "A sudden <span class='blank'>___________</span> of capital investment transformed the quiet railway junction into a primary regional logistics hub inside two years."}, {"verb": "come into view", "cat": "abrupt", "meaning": "To become visible or clear; suggests an emerging trend or data pattern finally manifesting clearly on an analytical chart.", "ex": "The full scale of the humanitarian disaster came into view only when aid workers were finally granted access.", "qs": "The full scale of the humanitarian disaster <span class='blank'>___________</span> only when aid workers were finally granted access."}, {"verb": "come to light", "cat": "abrupt", "meaning": "To be revealed or discovered; suggests hidden information or systemic errors being exposed to public or analytical view.", "ex": "It came to light that executives had been aware of the structural defects for years before the building collapsed.", "qs": "It <span class='blank'>___________</span> that executives had been aware of the structural defects for years before the building collapsed."}, {"verb": "come to the fore", "cat": "abrupt", "meaning": "To become prominent or important; suggests an issue or data variable rising to the absolute center of public or analytical focus.", "ex": "New voices have come to the fore in the debate, reflecting a generational shift in the movement's priorities.", "qs": "New voices have <span class='blank'>___________</span> in the debate, reflecting a generational shift in the movement's priorities."}, {"verb": "crop up", "cat": "abrupt", "meaning": "To appear or occur unexpectedly; suggests minor structural issues or data anomalies emerging without warning across a system.", "ex": "New legal complications cropped up just days before the merger was due to close, delaying the deal indefinitely.", "qs": "New legal complications <span class='blank'>___________</span> just days before the merger was due to close, delaying the deal indefinitely."}, {"verb": "emerge from", "cat": "abrupt", "meaning": "To come out of a state or condition; suggests a system or economy successfully exiting a period of severe contraction or crisis.", "ex": "The country is slowly emerging from two years of political paralysis that stalled essential structural reforms.", "qs": "The country is slowly <span class='blank'>___________</span> two years of political paralysis that stalled essential structural reforms."}, {"verb": "enable", "cat": "abrupt", "meaning": "To give the authority or means to do something; makes an action possible.", "ex": "One oriented to treating them as barriers that promote separation and the other to treating them as junctures that enable connecting.", "qs": "One oriented to treating them as barriers that promote separation and the other to treating them as junctures that <span class='blank'>___________</span> connecting."}, {"verb": "flare up", "cat": "abrupt", "meaning": "To erupt suddenly in anger or activity; suggests a violent, transient return of conflict or instability from a quiet baseline.", "ex": "Fighting flared up along the eastern front, shattering a ceasefire that had held for barely three weeks.", "qs": "Fighting <span class='blank'>___________</span> along the eastern front, shattering a ceasefire that had held for barely three weeks."}, {"verb": "flurry", "cat": "abrupt", "meaning": "A sudden, short period of commotion or excitement; also refers to a brief, light snowfall accompanied by a sudden gust of wind.", "ex": "The literature on governments' responses to fiscal stress and declines in re-source availability has grown fitfully, with a flurry of attention in the wake of every recession.", "qs": "The literature on governments' responses to fiscal stress and declines in re-source availability has grown fitfully, with a <span class='blank'>___________</span> of attention in the wake of every recession."}, {"verb": "flurry", "cat": "abrupt", "meaning": "A sudden, short period of commotion function pillHtml(slug, label, count) {
  const active = currentCat===slug ? ' active' : '';

}

function renderCatChips() {
  const el = document.getElementById('cat-chip-row');
  let chips = [];
  chips.push(`<button class="pill${currentCat==='all'?' active':''}" onclick="filterCat('all')">All (${verbs.length})</button>`);
  if (MISC_SLUG) chips.push(`<button class="pill pinned${currentCat===MISC_SLUG?' active':''}" onclick="filterCat('${MISC_SLUG}')">${catLabels[MISC_SLUG]} (${catCount[MISC_SLUG]})</button>`);
  chips.push(...popularSlugs.map(s => pillHtml(s, catLabels[s], catCount[s])));
  el.innerHTML = chips.join('');
}

function buildFilter() {
  const sel = document.getElementById('cat-select');
  const sorted = [...catSlugs].sort((a,b) => catLabels[a].localeCompare(catLabels[b]));

}

  return verbs.filter(v => {
    const mc = currentCat==='all' || v.cat===currentCat;
    const q = searchQuery.toLowerCase();
    const ms = !q || v.verb.toLowerCase().includes(q) || v.meaning.toLowerCase().includes(q);
    return mc && ms;
  });
}

function renderGrid() {
  const f = getFiltered();
  document.getElementById('result-count').textContent = f.length + ' word' + (f.length!==1?'s':'') + ' shown';
  document.getElementById('verb-grid').innerHTML = f.map(v => {
    const i = verbs.indexOf(v);
    const c = catColor[v.cat];
    return `<div class="verb-card" style="border-left-color:${c.border}" onclick="openModal(${i})">
      <div class="vc-verb">${v.verb}</div>
      <div class="vc-tag" style="color:${c.text}">${catLabels[v.cat]}</div>
      <div class="vc-meaning">${v.meaning}</div>
    </div>`;
  }).join('');
}

function filterCat(cat) {
  currentCat=cat;
  document.getElementById('cat-select').value = cat;
  renderCatChips();
  renderGrid();
}

function onSearch(val) { searchQuery=val; renderGrid(); }

function openModal(i) {
  const v = verbs[i];
  const c = catColor[v.cat];
  document.getElementById('m-verb').textContent = v.verb;
  document.getElementById('m-cat').innerHTML = `<span style="color:${c.text}">${catLabels[v.cat]}</span>`;
  document.getElementById('m-meaning').textContent = v.meaning;
  document.getElementById('m-ex').textContent = '"'+v.ex+'"';
  document.getElementById('modal').classList.add('open');
}

function shuffle(a) { return [...a].sort(()=>Math.random()-0.5); }

let quizHistory=[]; // {v, optObjs, answered, chosenText, isCorrect}
let quizPos=-1;

function startQuiz() {
  quizQueue=shuffle(verbs); quizIdx=0;
  quizHistory=[]; quizPos=-1;
  updateScore();
  goNext();
}

function makeEntry() {
  if(quizIdx>=quizQueue.length){quizIdx=0;quizQueue=shuffle(verbs);}
  const v=quizQueue[quizIdx]; quizIdx++;
  const seen = new Set([v.verb.toLowerCase()]);
  const picks = [];
  for (const cand of shuffle(verbs)) {
    if (picks.length>=3) break;
    const key = cand.verb.toLowerCase();
    if (!seen.has(key)) { picks.push(cand); seen.add(key); }
  }
  return { v, optObjs: shuffle([v, ...picks]), answered:false, chosenText:null, isCorrect:null };
}

function goNext() {
  if (quizPos+1 < quizHistory.length) { quizPos++; }
  else { quizHistory.push(makeEntry()); quizPos=quizHistory.length-1; }
  renderEntry();
}

function goBack() {
  if (quizPos>0) { quizPos--; renderEntry(); }
}

function updateScore() {
  const answered = quizHistory.filter(e=>e.answered);
  const correct = answered.filter(e=>e.isCorrect);
  document.getElementById('q-score').textContent = 'Score: '+correct.length+' / '+answered.length;
}

function renderEntry() {
  const entry = quizHistory[quizPos];
  const v = entry.v;
  document.getElementById('q-fb').textContent='';
  document.getElementById('q-meanings').innerHTML='';
  document.getElementById('q-meta').textContent='Question '+(quizPos+1)+' · '+verbs.length+' words in pool';
  document.getElementById('q-sent').innerHTML='"'+v.qs+'"';
  document.getElementById('q-back').disabled = quizPos<=0;

  const optsEl = document.getElementById('q-opts');
  const typeInput = document.getElementById('q-type-input');
  typeInput.value = entry.chosenText && !isOptionText(entry) ? entry.chosenText : '';
  typeInput.classList.remove('correct','wrong');
  typeInput.disabled=false;
  document.getElementById('q-type-submit').disabled=false;
  typeInput.onkeydown = (e) => { if(e.key==='Enter') submitType(); };

  optsEl.innerHTML = entry.optObjs.map(()=>'<button class="qopt"></button>').join('');
  [...optsEl.children].forEach((btn, idx) => {
    btn.textContent = entry.optObjs[idx].verb;
    btn.style.pointerEvents='';
    btn.addEventListener('click', () => checkQ(entry.optObjs[idx].verb));
  });

  if (entry.answered) {
    showAnsweredState(entry);
  }
}

function isOptionText(entry) {
  return entry.optObjs.some(o => o.verb.toLowerCase()===  (entry.chosenText||'').toLowerCase());
}

function lockAnswering() {
  document.querySelectorAll('.qopt').forEach(b => b.style.pointerEvents='none');
  document.getElementById('q-type-input').disabled=true;
  document.getElementById('q-type-submit').disabled=true;
}

function showAnsweredState(entry) {
  lockAnswering();
  const correct = entry.v.verb;
  document.querySelectorAll('.qopt').forEach(b=>{
    if(b.textContent===correct) b.classList.add('correct');
    else if(entry.chosenText && b.textContent.toLowerCase()===entry.chosenText.toLowerCase() && !entry.isCorrect) b.classList.add('wrong');
  });
  const typeInput = document.getElementById('q-type-input');
  if (entry.chosenText && !isOptionText(entry)) {
    typeInput.value = entry.chosenText;
    typeInput.classList.add(entry.isCorrect?'correct':'wrong');
  }
  document.getElementById('q-fb').innerHTML = entry.isCorrect
    ? '✓ Correct!'
    : `✗ Answer: <strong>${correct}</strong>`;
  renderMeanings(entry);
}

function renderMeanings(entry) {
  const chosenLower = (entry.chosenText||'').trim().toLowerCase();
  const el = document.getElementById('q-meanings');
  el.innerHTML = entry.optObjs.map(o => {
    const isCorrect = o.verb.toLowerCase()===entry.v.verb.toLowerCase();
    const isChosenWrong = !isCorrect && o.verb.toLowerCase()===chosenLower;
    const cls = isCorrect ? 'correct' : (isChosenWrong ? 'wrong' : '');
    return `<div class="qm-item ${cls}"><strong>${o.verb}</strong> — ${o.meaning}</div>`;
  }).join('');
}

function checkQ(chosen) {
  const entry = quizHistory[quizPos];
  if(entry.answered) return;
  entry.answered=true;
  entry.chosenText=chosen;
  entry.isCorrect = chosen.toLowerCase()===entry.v.verb.toLowerCase();
  updateScore();
  showAnsweredState(entry);
}

function submitType() {
  const entry = quizHistory[quizPos];
  if(entry.answered) return;
  const input = document.getElementById('q-type-input');
  const typed = input.value.trim();
  if(!typed) return;
  // accept the exact word/phrase anywhere within a longer typed sentence
  const escaped = entry.v.verb.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const pattern = new RegExp('\\b'+escaped+'\\b', 'i');
  entry.answered=true;
  entry.chosenText=typed;
  entry.isCorrect = pattern.test(typed);
  updateScore();
  showAnsweredState(entry);
}

function renderSheet() {
  const el=document.getElementById('tab-sheet');
  const sorted = [...catSlugs].sort((a,b) => catLabels[a].localeCompare(catLabels[b]));
  el.innerHTML=sorted.map(slug=>{
    const list=verbs.filter(v=>v.cat===slug);
    if(!list.length) return '';
    return `<div class="sheet-sec">
      <div class="sheet-title">${catLabels[slug]} (${list.length})</div>
      <table>
        <tr><th>Word / phrase</th><th>Meaning</th></tr>
        ${list.map(v=>`<tr><td>${v.verb}</td><td>${v.meaning}</td></tr>`).join('')}
      </table>
    </div>`;
  }).join('');
}

function showTab(name) {
  ['browse','quiz','sheet'].forEach(t=>document.getElementById('tab-'+t).style.display=t===name?'':'none');
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['browse','quiz','sheet'][i]===name));
  if(name==='quiz') startQuiz();
  if(name==='sheet') renderSheet();
}

buildFilter();
renderGrid();
startQuiz();
</script>
